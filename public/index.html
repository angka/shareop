<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareOp - Jadwal Operasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ShareOp</h1>
            <p>Aplikasi Jadwal Operasi & Telegram Bot</p>
        </header>

        <main>
            <div class="date-picker">
                <label for="tanggal">Pilih Tanggal:</label>
                <input type="date" id="tanggal">
            </div>

            <div class="kamars-container" id="kamarsContainer">
                <!-- Kamar operasi akan di-generate di sini -->
            </div>

            <div class="actions">
                <button id="tambahKamarBtn">+ Tambah Kamar</button>
                <button id="simpanBtn">💾 Simpan</button>
                <button id="previewBtn">👁 Preview Pesan</button>
                <button id="kirimTelegramBtn">📲 Kirim ke Telegram</button>
            </div>
        </main>

        <!-- Preview Modal -->
        <div id="previewModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Preview Pesan Telegram</h2>
                <div id="previewText" class="preview-text"></div>
                <div class="modal-actions">
                    <button id="closePreviewBtn">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
